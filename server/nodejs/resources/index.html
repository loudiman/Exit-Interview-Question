<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Dashboard</title>

    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/nav-bar.css" rel="stylesheet">
    <link href="/static/css/side-bar.css" rel="stylesheet">
    <link href="/static/css/index.css" rel="stylesheet">
    <script defer src="/static/js/index.js"></script>
</head>
<body>
<header class="navbar">
    <button aria-label="Toggle Sidebar" id="sidebarToggle">☰</button>
    <img alt="Profile" height="30" src="/static/images/male_user.png" width="30">
</header>

<div class="container">
    <!-- Sidebar -->
    <nav aria-label="Main Navigation" class="sidebar" id="sidebar">
        <a aria-label="Home" class="active" href="#">
            <img alt="Home Icon" src="/static/images/home_icon.png"> Home
        </a>
        <a aria-label="Create" href="#">
            <img alt="Create Icon" src="/static/images/create_icon.png"> Create
        </a>
        <a aria-label="View" href="#">
            <img alt="View Icon" src="/static/images/view_icon.png"> View
        </a>
        <a aria-label="Respondents" href="#">
            <img alt="Respondents Icon" src="/static/images/respondents_icon.png"> Respondents
        </a>
        <a aria-label="Profile" href="#">
            <img alt="Profile Icon" src="/static/images/male_user.png"> Profile
        </a>
    </nav>

    <!-- Main Content -->
    <main class="content" id="mainContent">
        <!-- Card View Container -->
        <section class="card-dashboard"></section>

        <!-- Search Bar -->
        <section class="search-bar">
            <h1>Recent Surveys</h1>
            <label for="searchInput"></label><input id="searchInput" placeholder="Search" type="text">
            <button aria-label="Search Surveys" id="searchButton">
                <img src="/static/images/Search.png" alt="Search Icon">
            </button>
        </section>

        <!-- Survey Labels -->
        <section class="survey-label">
            <div class="label-title">Survey Title</div>
            <div class="label-respondents">Respondents</div>
            <div class="label-status">Status</div>
        </section>

        <!-- Main Survey View -->
        <section class="survey-view">
            <div id="unpublishedSurveys" class="survey-list"></div>
            <div id="publishedSurveys" class="survey-list"></div>
        </section>
    </main>

    <!-- Modal for Survey Preview -->
    <dialog aria-describedby="previewModalDesc" aria-labelledby="previewModalTitle" class="modal" id="previewModal">
        <div class="modal-content">
            <h3 id="previewModalTitle">Survey Details</h3>
            <div id="previewModalDesc">
                <p id="previewSurveyTitle"></p>
                <p><strong>Status:</strong> <span id="previewSurveyStatus"></span></p>
                <p><strong>Program ID:</strong> <span id="previewProgramId"></span></p>
                <p><strong>Period Start:</strong> <span id="previewPeriodStart"></span></p>
                <p><strong>Period End:</strong> <span id="previewPeriodEnd"></span></p>
            </div>
            <button aria-label="Close Preview" class="close-btn" id="closePreview">Close</button>
        </div>
    </dialog>
</div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetchProtectedData();
    });

    function fetchProtectedData() {
        const token = sessionStorage.getItem('token');

        if (!token) {
            console.error("No token found in sessionStorage");
            return;
        }

        fetch('/api/items', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch protected data');
                }
                return response.text();
            })
            .then(data => {
                console.log("Protected Data:", data);
            })
            .catch(error => console.error("Error:", error));
    }
</script>
</html>
